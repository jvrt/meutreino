<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Meu Treino">
<meta name="theme-color" content="#0e0e10">
<title>Meu Treino</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0e10;--sur:#17171a;--sur2:#1f1f23;--sur3:#27272c;--brd:rgba(255,255,255,0.07);--brd2:rgba(255,255,255,0.13);--acc:#c8ff00;--acc-d:rgba(200,255,0,0.12);--acc-m:rgba(200,255,0,0.25);--txt:#f0f0f0;--txt2:#888;--txt3:#555;--upper:#7c6cfa;--upper-bg:rgba(124,108,250,0.12);--lower:#2dd4a0;--lower-bg:rgba(45,212,160,0.12);--rest:#555;--rest-bg:rgba(85,85,85,0.1);--cardio:#f7a832;--cardio-bg:rgba(247,168,50,0.12);--done:rgba(200,255,0,0.08);--done-brd:rgba(200,255,0,0.25);--r:10px;--r-lg:16px;--font:'Syne',sans-serif;--mono:'DM Mono',monospace;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);min-height:100vh;}
body{font-family:var(--font);color:var(--txt);max-width:480px;margin:0 auto;padding-bottom:120px;}

.topbar{position:sticky;top:0;z-index:100;background:rgba(14,14,16,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--brd);padding:14px 18px 12px;display:flex;align-items:center;justify-content:space-between;}
.topbar-title{font-size:18px;font-weight:800;letter-spacing:-0.5px;}
.topbar-title span{color:var(--acc);}
.topbar-date{font-family:var(--mono);font-size:11px;color:var(--txt3);text-transform:uppercase;}

.home{padding:20px 18px;}
.greeting{font-size:28px;font-weight:800;line-height:1.1;margin-bottom:6px;letter-spacing:-1px;}
.greeting .hi{color:var(--acc);}
.sub{font-family:var(--mono);font-size:12px;color:var(--txt2);margin-bottom:24px;}

.week-label,.section-label{font-family:var(--mono);font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:28px;}
.day-chip{aspect-ratio:1;border-radius:8px;border:1px solid var(--brd);background:var(--sur);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;position:relative;}
.day-chip:active{opacity:.7;}
.day-chip .dname{font-family:var(--mono);font-size:9px;color:var(--txt3);text-transform:uppercase;margin-bottom:2px;}
.day-chip .dtype{font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
.day-chip.upper .dtype{color:var(--upper);}
.day-chip.lower .dtype{color:var(--lower);}
.day-chip.rest .dtype{color:var(--rest);}
.day-chip.cardio .dtype{color:var(--cardio);}
.done-dot{position:absolute;top:4px;right:4px;width:5px;height:5px;border-radius:50%;background:var(--acc);}

.workout-card{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r-lg);overflow:hidden;margin-bottom:12px;cursor:pointer;transition:all .15s;}
.workout-card:active{opacity:.8;}
.wc-header{padding:14px 16px;display:flex;align-items:center;gap:12px;}
.wc-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;text-transform:uppercase;letter-spacing:.05em;}
.wc-badge.upper{background:var(--upper-bg);color:var(--upper);}
.wc-badge.lower{background:var(--lower-bg);color:var(--lower);}
.wc-badge.rest{background:var(--rest-bg);color:var(--rest);}
.wc-badge.cardio{background:var(--cardio-bg);color:var(--cardio);}
.wc-title{font-weight:700;font-size:15px;flex:1;}
.wc-time{font-family:var(--mono);font-size:11px;color:var(--txt2);}
.wc-meta{padding:0 16px 14px;font-family:var(--mono);font-size:11px;color:var(--txt2);}
.wc-prog{height:2px;background:var(--brd);margin:0 16px 14px;border-radius:2px;overflow:hidden;}
.wc-prog-fill{height:100%;background:var(--acc);border-radius:2px;transition:width .3s;}

.train-view{padding:0 18px;display:none;}
.train-header{padding:20px 0 16px;}
.train-back{font-family:var(--mono);font-size:11px;color:var(--txt2);cursor:pointer;display:flex;align-items:center;gap:6px;margin-bottom:14px;transition:color .15s;background:none;border:none;padding:0;}
.train-back:active{color:var(--acc);}
.train-title{font-size:24px;font-weight:800;letter-spacing:-0.5px;margin-bottom:4px;}
.train-sub{font-family:var(--mono);font-size:11px;color:var(--txt2);}
.prog-bar{height:3px;background:var(--brd);border-radius:3px;overflow:hidden;margin:16px 0;}
.prog-fill{height:100%;background:var(--acc);transition:width .3s;}

.ex-item{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);margin-bottom:8px;overflow:hidden;transition:border-color .2s,background .2s;}
.ex-item.done{background:var(--done);border-color:var(--done-brd);}
.ex-main{padding:13px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;}
.ex-check{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--brd2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.ex-item.done .ex-check{background:var(--acc);border-color:var(--acc);}
.ex-chk-svg{opacity:0;transition:opacity .15s;}
.ex-item.done .ex-chk-svg{opacity:1;}
.ex-info{flex:1;min-width:0;}
.ex-name{font-weight:600;font-size:14px;line-height:1.2;margin-bottom:3px;}
.ex-item.done .ex-name{color:var(--txt2);text-decoration:line-through;text-decoration-color:var(--txt3);}
.ex-sets{font-family:var(--mono);font-size:11px;color:var(--txt2);}
.ex-rest{font-family:var(--mono);font-size:10px;color:var(--txt3);}
.ex-expand{width:24px;height:24px;border-radius:6px;background:var(--sur2);border:1px solid var(--brd);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;cursor:pointer;color:var(--txt2);font-size:14px;}
.ex-item.expanded .ex-expand{transform:rotate(180deg);}

.log-panel{padding:0 14px 14px;display:none;}
.ex-item.expanded .log-panel{display:block;}
.log-div{height:1px;background:var(--brd);margin-bottom:12px;}
.log-sets{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
.log-set-row{display:flex;align-items:center;gap:8px;}
.set-num{font-family:var(--mono);font-size:11px;color:var(--txt3);width:24px;text-align:right;flex-shrink:0;}
.log-input{flex:1;background:var(--sur2);border:1px solid var(--brd);border-radius:7px;padding:7px 10px;color:var(--txt);font-family:var(--mono);font-size:12px;outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none;}
.log-input:focus{border-color:var(--acc);}
.log-input::placeholder{color:var(--txt3);}
.log-input-lbl{font-family:var(--mono);font-size:9px;color:var(--txt3);text-transform:uppercase;letter-spacing:.05em;text-align:center;}
.note-lbl{font-family:var(--mono);font-size:10px;color:var(--txt3);margin-bottom:4px;}
.log-note{width:100%;background:var(--sur2);border:1px solid var(--brd);border-radius:7px;padding:8px 10px;color:var(--txt);font-family:var(--mono);font-size:12px;outline:none;resize:none;height:60px;transition:border-color .15s;}
.log-note:focus{border-color:var(--acc);}
.log-note::placeholder{color:var(--txt3);}

.finish-btn{width:100%;padding:15px;background:var(--acc);color:#0e0e10;font-family:var(--font);font-weight:800;font-size:15px;border:none;border-radius:var(--r);cursor:pointer;margin-top:20px;letter-spacing:.01em;transition:opacity .15s,transform .1s;}
.finish-btn:active{transform:scale(0.98);}

.summary-view{padding:20px 18px;display:none;}
.summary-title{font-size:32px;font-weight:800;letter-spacing:-1px;margin-bottom:4px;}
.summary-title .ok{color:var(--acc);}
.sum-sub{font-family:var(--mono);font-size:12px;color:var(--txt2);margin-bottom:28px;}
.sum-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.sum-card{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);padding:14px;}
.sum-card .sl{font-family:var(--mono);font-size:10px;color:var(--txt3);text-transform:uppercase;margin-bottom:6px;}
.sum-card .sv{font-size:22px;font-weight:700;}
.sum-log{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);overflow:hidden;}
.sum-log-hdr{padding:12px 14px;border-bottom:1px solid var(--brd);font-family:var(--mono);font-size:10px;color:var(--txt3);text-transform:uppercase;}
.sum-ex-row{padding:10px 14px;border-bottom:1px solid var(--brd);display:flex;align-items:flex-start;gap:10px;}
.sum-ex-row:last-child{border-bottom:none;}
.sum-ex-chk{width:16px;height:16px;border-radius:4px;background:var(--acc-d);border:1px solid var(--done-brd);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.sum-ex-name{font-size:13px;font-weight:600;margin-bottom:2px;}
.sum-ex-log{font-family:var(--mono);font-size:11px;color:var(--txt2);}
.back-btn{width:100%;padding:14px;background:var(--sur);border:1px solid var(--brd2);color:var(--txt);font-family:var(--font);font-weight:700;font-size:14px;border-radius:var(--r);cursor:pointer;margin-top:12px;transition:all .15s;}

.hist-section{margin-top:22px;}
.hist-item{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;}
.hist-item-top{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.hist-date{font-family:var(--mono);font-size:10px;color:var(--txt3);}
.hist-label{font-weight:700;font-size:13px;flex:1;}
.hist-sub{font-family:var(--mono);font-size:10px;color:var(--txt2);}
.hist-clear{font-family:var(--mono);font-size:10px;color:var(--txt3);background:none;border:1px solid var(--brd);border-radius:7px;padding:4px 10px;cursor:pointer;}

.timer-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(14,14,16,0.97);backdrop-filter:blur(12px);border-top:1px solid var(--brd);padding:12px 18px 28px;display:flex;align-items:center;gap:12px;z-index:200;}
.timer-disp{font-family:var(--mono);font-size:28px;font-weight:500;color:var(--acc);min-width:80px;}
.timer-disp.paused{color:var(--txt2);}
.timer-lbl{font-family:var(--mono);font-size:10px;color:var(--txt3);text-transform:uppercase;}
.timer-btns{margin-left:auto;display:flex;gap:8px;}
.tbtn{padding:8px 16px;border-radius:8px;border:1px solid var(--brd2);background:var(--sur2);color:var(--txt);font-family:var(--mono);font-size:12px;cursor:pointer;}
.tbtn.primary{background:var(--acc);color:#0e0e10;border-color:var(--acc);font-weight:500;}

.cardio-note{background:var(--cardio-bg);border:1px solid rgba(247,168,50,0.25);border-radius:var(--r);padding:14px;font-family:var(--mono);font-size:12px;color:var(--cardio);line-height:1.7;white-space:pre-line;}
.rest-note{background:var(--rest-bg);border:1px solid var(--brd);border-radius:var(--r);padding:14px;font-family:var(--mono);font-size:12px;color:var(--txt2);line-height:1.7;white-space:pre-line;}

.save-badge{position:fixed;top:62px;right:14px;background:var(--acc);color:#0e0e10;font-family:var(--mono);font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;}
.save-badge.show{opacity:1;}
</style>
</head>
<body>

<div id="save-badge" class="save-badge">✓ salvo</div>

<div class="topbar">
  <div><div class="topbar-title">meu<span>treino</span></div></div>
  <div class="topbar-date" id="topbar-date"></div>
</div>

<!-- HOME -->
<div class="home" id="home-view">
  <div class="greeting"><span class="hi">Bora</span><br>treinar.</div>
  <div class="sub">// upper · lower · 4x semana</div>
  <div class="week-label">Semana</div>
  <div class="week-grid" id="week-grid"></div>
  <div class="section-label">Selecione o treino de hoje</div>
  <div id="workout-list"></div>
  <div class="hist-section">
    <div class="section-label" style="display:flex;align-items:center;justify-content:space-between;">
      <span>Histórico</span>
      <button class="hist-clear" onclick="clearHistory()">limpar histórico</button>
    </div>
    <div id="history-list"></div>
  </div>
</div>

<!-- TREINO -->
<div class="train-view" id="train-view">
  <div class="train-header">
    <button class="train-back" onclick="goHome()">← voltar</button>
    <div class="train-title" id="tv-title"></div>
    <div class="train-sub" id="tv-sub"></div>
    <div class="prog-bar"><div class="prog-fill" id="tv-prog" style="width:0%"></div></div>
  </div>
  <div id="exercise-list"></div>
  <button class="finish-btn" onclick="finishWorkout()">Finalizar treino →</button>
</div>

<!-- RESUMO -->
<div class="summary-view" id="summary-view">
  <div class="summary-title"><span class="ok">Treino</span><br>concluído.</div>
  <div class="sum-sub" id="sum-sub"></div>
  <div class="sum-cards">
    <div class="sum-card"><div class="sl">Exercícios</div><div class="sv" id="sum-excount">—</div></div>
    <div class="sum-card"><div class="sl">Concluídos</div><div class="sv" id="sum-done">—</div></div>
    <div class="sum-card"><div class="sl">Duração</div><div class="sv" id="sum-time">—</div></div>
    <div class="sum-card"><div class="sl">Séries total</div><div class="sv" id="sum-sets">—</div></div>
  </div>
  <div class="sum-log">
    <div class="sum-log-hdr">log de exercícios</div>
    <div id="sum-log-list"></div>
  </div>
  <button class="back-btn" onclick="goHome()">← voltar ao início</button>
</div>

<!-- TIMER -->
<div class="timer-bar">
  <div>
    <div class="timer-lbl">descanso</div>
    <div class="timer-disp" id="timer-disp">00:00</div>
  </div>
  <div class="timer-btns">
    <button class="tbtn" onclick="resetTimer()">reset</button>
    <button class="tbtn primary" id="timer-toggle" onclick="toggleTimer()">iniciar</button>
  </div>
</div>

<script>
const WORKOUTS=[
  {id:'upperA',type:'upper',label:'Upper A',day:'Segunda',time:'~50 min',focus:'Força em peito e costas · tríceps',exercises:[
    {name:'Supino reto (máquina convergente)',sets:4,reps:'6–8',rest:'2–3 min',num:1},
    {name:'Remada na máquina / polia baixa',sets:4,reps:'6–8',rest:'2–3 min',num:2},
    {name:'Desenvolvimento ombros (máquina)',sets:3,reps:'10–12',rest:'90 seg',num:3},
    {name:'Crucifixo / Pec deck',sets:3,reps:'12–15',rest:'60 seg',num:4},
    {name:'Tríceps na polia (corda)',sets:3,reps:'12–15',rest:'60 seg',num:5},
    {name:'Encolhimento de ombros (máquina)',sets:3,reps:'15',rest:'60 seg',num:6},
  ]},
  {id:'lowerA',type:'lower',label:'Lower A',day:'Terça',time:'~50 min',focus:'Quadríceps, glúteos e posterior',exercises:[
    {name:'Leg press 45°',sets:4,reps:'8–10',rest:'2–3 min',num:1},
    {name:'Cadeira extensora',sets:3,reps:'12–15',rest:'90 seg',num:2},
    {name:'Stiff (halteres ou barra)',sets:3,reps:'10–12',rest:'2 min',num:3},
    {name:'Cadeira flexora (deitada)',sets:3,reps:'12–15',rest:'90 seg',num:4},
    {name:'Panturrilha no leg press',sets:4,reps:'15–20',rest:'60 seg',num:5},
    {name:'Abdominal (crunch ou roda)',sets:3,reps:'15–20',rest:'60 seg',num:6},
  ]},
  {id:'rest1',type:'rest',label:'Descanso',day:'Quarta',time:null,focus:'Recuperação ativa ou cardio leve',exercises:[]},
  {id:'upperB',type:'upper',label:'Upper B',day:'Quinta',time:'~50 min',focus:'Volume em costas, bíceps e ombro',exercises:[
    {name:'Puxada na polia (pronada/neutra)',sets:4,reps:'8–10',rest:'2 min',num:1},
    {name:'Supino inclinado (máquina/halteres)',sets:4,reps:'8–10',rest:'2 min',num:2},
    {name:'Remada cavalinho / polia alta uni.',sets:3,reps:'12',rest:'90 seg',num:3},
    {name:'Elevação lateral (halteres/cabos)',sets:4,reps:'15–20',rest:'60 seg',num:4},
    {name:'Rosca direta (barra EZ/halteres)',sets:3,reps:'10–12',rest:'60 seg',num:5},
    {name:'Rosca martelo alternada',sets:3,reps:'10–12',rest:'60 seg',num:6},
  ]},
  {id:'lowerB',type:'lower',label:'Lower B',day:'Sexta',time:'~50 min',focus:'Agachamento, adutores e posterior',exercises:[
    {name:'Agachamento hack (máquina/Smith)',sets:4,reps:'8–10',rest:'2–3 min',num:1},
    {name:'Cadeira adutora',sets:3,reps:'15',rest:'60 seg',num:2},
    {name:'Terra romeno (halteres)',sets:3,reps:'10–12',rest:'2 min',num:3},
    {name:'Cadeira flexora (sentada)',sets:3,reps:'12–15',rest:'90 seg',num:4},
    {name:'Panturrilha em pé (Smith/máquina)',sets:4,reps:'15–20',rest:'60 seg',num:5},
    {name:'Prancha abdominal',sets:3,reps:'30–45 seg',rest:'60 seg',num:6},
  ]},
  {id:'cardio',type:'cardio',label:'Cardio',day:'Sábado',time:'20–25 min',focus:'LISS moderado — esteira inclinada ou bike',exercises:[]},
  {id:'rest2',type:'rest',label:'Descanso',day:'Domingo',time:null,focus:'Descanso total — recuperação e sono',exercises:[]},
];
const DAYS=['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];

let state={currentWorkout:null,exerciseStates:{},startTime:null};
let timerInt=null,timerSec=0,timerRunning=false,saveTimer=null;

function ls(key){try{const v=localStorage.getItem(key);return v?JSON.parse(v):null;}catch{return null;}}
function lsSet(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch(e){console.error(e);}}

function showSaved(){const b=document.getElementById('save-badge');b.classList.add('show');setTimeout(()=>b.classList.remove('show'),1400);}

function debounceSave(){clearTimeout(saveTimer);saveTimer=setTimeout(autosave,400);}

function pad(n){return String(n).padStart(2,'0');}
function fmtT(s){return pad(Math.floor(s/60))+':'+pad(s%60);}

function toggleTimer(){
  if(timerRunning){
    clearInterval(timerInt);timerRunning=false;
    document.getElementById('timer-toggle').textContent='iniciar';
    document.getElementById('timer-disp').classList.add('paused');
  }else{
    timerRunning=true;
    document.getElementById('timer-toggle').textContent='pausar';
    document.getElementById('timer-disp').classList.remove('paused');
    timerInt=setInterval(()=>{timerSec++;document.getElementById('timer-disp').textContent=fmtT(timerSec);},1000);
  }
}
function resetTimer(){
  clearInterval(timerInt);timerRunning=false;timerSec=0;
  document.getElementById('timer-disp').textContent='00:00';
  document.getElementById('timer-disp').classList.remove('paused');
  document.getElementById('timer-toggle').textContent='iniciar';
}

function initDate(){
  document.getElementById('topbar-date').textContent=new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'short'});
}

function renderWeekGrid(){
  const grid=document.getElementById('week-grid');grid.innerHTML='';
  const cw=ls('cw')||{};
  WORKOUTS.forEach((w,i)=>{
    const c=document.createElement('div');
    c.className='day-chip '+w.type;
    c.innerHTML=`<span class="dname">${DAYS[i]}</span><span class="dtype">${w.label.split(' ')[0]}</span>`;
    if(cw[w.id]&&cw[w.id].done)c.innerHTML+='<span class="done-dot"></span>';
    c.onclick=()=>startWorkout(w.id);
    grid.appendChild(c);
  });
}

function renderWorkoutList(){
  const list=document.getElementById('workout-list');list.innerHTML='';
  const cw=ls('cw')||{};
  WORKOUTS.forEach(w=>{
    const card=document.createElement('div');card.className='workout-card';
    let progress=0;
    if(w.exercises.length>0&&cw[w.id]&&cw[w.id].es){
      const done=Object.values(cw[w.id].es).filter(e=>e.done).length;
      progress=Math.round(done/w.exercises.length*100);
    }
    card.innerHTML=`
      <div class="wc-header">
        <span class="wc-badge ${w.type}">${w.label}</span>
        <span class="wc-title">${w.day}</span>
        ${w.time?`<span class="wc-time">${w.time}</span>`:''}
      </div>
      <div class="wc-meta">${w.focus}</div>
      ${w.exercises.length>0?`<div class="wc-prog"><div class="wc-prog-fill" style="width:${progress}%"></div></div>`:''}`;
    card.onclick=()=>startWorkout(w.id);
    list.appendChild(card);
  });
}

function renderHistory(){
  const list=document.getElementById('history-list');list.innerHTML='';
  const hist=ls('hist')||[];
  if(!hist.length){
    list.innerHTML=`<div style="font-family:var(--mono);font-size:11px;color:var(--txt3);padding:10px 0">// Nenhum treino concluído ainda</div>`;
    return;
  }
  [...hist].reverse().slice(0,10).forEach(h=>{
    const el=document.createElement('div');el.className='hist-item';
    el.innerHTML=`
      <div class="hist-item-top">
        <span class="wc-badge ${h.type}">${h.label}</span>
        <span class="hist-label">${h.day}</span>
        <span class="hist-date">${h.dateStr}</span>
      </div>
      <div class="hist-sub">${h.duration} · ${h.doneCount}/${h.totalEx} exercícios · ${h.totalSets} séries</div>`;
    list.appendChild(el);
  });
}

function startWorkout(id){
  const w=WORKOUTS.find(x=>x.id===id);if(!w)return;
  state.currentWorkout=w;state.startTime=Date.now();
  const cw=ls('cw')||{};
  const saved=cw[w.id];
  if(saved&&saved.es){
    state.exerciseStates=JSON.parse(JSON.stringify(saved.es));
  }else{
    state.exerciseStates={};
    w.exercises.forEach(ex=>{
      state.exerciseStates[ex.num]={done:false,sets:Array.from({length:ex.sets},()=>({kg:'',reps:''})),note:''};
    });
  }
  renderTrainView(w);show('train');
}

function renderTrainView(w){
  document.getElementById('tv-title').textContent=w.label+' — '+w.day;
  document.getElementById('tv-sub').textContent=w.focus;
  const list=document.getElementById('exercise-list');list.innerHTML='';
  if(w.type==='rest'){list.innerHTML=`<div class="rest-note">// Dia de descanso\n\nAproveite para recuperar.\nSono de qualidade e alimentação bem feita\nsão parte do treino.</div>`;return;}
  if(w.type==='cardio'){list.innerHTML=`<div class="cardio-note">// Cardio LISS — 20 a 25 min\n\nOpções: esteira c/ inclinação 8–12%\nbike ergométrica cadenciada\nelíptico resistência moderada\n\nZona alvo: 60–70% FC máx\nEvite HIIT — preserva massa muscular.</div>`;return;}
  w.exercises.forEach(ex=>{
    const es=state.exerciseStates[ex.num];
    const item=document.createElement('div');
    item.className='ex-item'+(es.done?' done':'');
    item.id='ex-'+ex.num;
    let setsHtml='';
    es.sets.forEach((s,si)=>{
      setsHtml+=`<div class="log-set-row">
        <span class="set-num">${si+1}</span>
        <div style="flex:1">
          <div class="log-input-lbl">kg</div>
          <input class="log-input" type="number" inputmode="decimal" placeholder="—" value="${s.kg}"
            oninput="updSet(${ex.num},${si},'kg',this.value)" onfocus="this.select()">
        </div>
        <div style="flex:1">
          <div class="log-input-lbl">reps</div>
          <input class="log-input" type="text" inputmode="numeric" placeholder="${ex.reps}" value="${s.reps}"
            oninput="updSet(${ex.num},${si},'reps',this.value)" onfocus="this.select()">
        </div>
      </div>`;
    });
    item.innerHTML=`
      <div class="ex-main" onclick="toggleDone(${ex.num})">
        <div class="ex-check">
          <svg class="ex-chk-svg" width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M2 6L5 9L10 3" stroke="#0e0e10" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="ex-info">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-sets">${ex.sets} séries × ${ex.reps}</div>
          <div class="ex-rest">descanso: ${ex.rest}</div>
        </div>
        <button class="ex-expand" onclick="event.stopPropagation();toggleExp(${ex.num})">▾</button>
      </div>
      <div class="log-panel">
        <div class="log-div"></div>
        <div class="log-sets">${setsHtml}</div>
        <div class="note-lbl">anotações</div>
        <textarea class="log-note" placeholder="peso usado, sensações, observações..."
          oninput="updNote(${ex.num},this.value)">${es.note||''}</textarea>
      </div>`;
    list.appendChild(item);
  });
  updateProgress(w);
}

function toggleDone(n){
  const es=state.exerciseStates[n];es.done=!es.done;
  document.getElementById('ex-'+n).classList.toggle('done',es.done);
  if(es.done)resetTimer();
  updateProgress(state.currentWorkout);
  autosave();
}
function toggleExp(n){document.getElementById('ex-'+n).classList.toggle('expanded');}

function updSet(n,si,field,val){
  state.exerciseStates[n].sets[si][field]=val;
  debounceSave();
}
function updNote(n,val){
  state.exerciseStates[n].note=val;
  debounceSave();
}

function updateProgress(w){
  if(!w.exercises.length)return;
  const done=Object.values(state.exerciseStates).filter(e=>e.done).length;
  document.getElementById('tv-prog').style.width=Math.round(done/w.exercises.length*100)+'%';
}

function autosave(){
  if(!state.currentWorkout)return;
  const cw=ls('cw')||{};
  if(!cw[state.currentWorkout.id])cw[state.currentWorkout.id]={};
  cw[state.currentWorkout.id].es=JSON.parse(JSON.stringify(state.exerciseStates));
  lsSet('cw',cw);
  showSaved();
}

function finishWorkout(){
  const w=state.currentWorkout;
  const elapsed=Math.round((Date.now()-state.startTime)/1000);
  const mins=Math.floor(elapsed/60),secs=elapsed%60;
  const duration=mins+'m '+secs+'s';
  const cw=ls('cw')||{};
  if(!cw[w.id])cw[w.id]={};
  cw[w.id].done=true;
  cw[w.id].es=JSON.parse(JSON.stringify(state.exerciseStates));
  lsSet('cw',cw);
  const exStates=Object.values(state.exerciseStates);
  const doneCount=exStates.filter(e=>e.done).length;
  const totalSets=exStates.reduce((a,e)=>a+e.sets.filter(s=>s.kg||s.reps).length,0);
  const hist=ls('hist')||[];
  hist.push({id:w.id,type:w.type,label:w.label,day:w.day,
    dateStr:new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'2-digit'}),
    duration,doneCount,totalEx:w.exercises.length,totalSets});
  lsSet('hist',hist);
  document.getElementById('sum-sub').textContent=`// ${w.label} · ${w.day}`;
  document.getElementById('sum-excount').textContent=w.exercises.length;
  document.getElementById('sum-done').textContent=doneCount;
  document.getElementById('sum-time').textContent=duration;
  document.getElementById('sum-sets').textContent=totalSets;
  const logList=document.getElementById('sum-log-list');logList.innerHTML='';
  w.exercises.forEach(ex=>{
    const es=state.exerciseStates[ex.num];
    const setLog=es.sets.map((s,i)=>`S${i+1}: ${s.kg?s.kg+'kg ':''} ${s.reps||'—'}`).filter(s=>s.includes('kg')||es.done).join(' · ');
    const row=document.createElement('div');row.className='sum-ex-row';
    row.innerHTML=`
      <div class="sum-ex-chk">${es.done?`<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 5L4.5 7.5L8.5 3" stroke="#c8ff00" stroke-width="1.5" stroke-linecap="round"/></svg>`:''}</div>
      <div>
        <div class="sum-ex-name" style="${!es.done?'color:var(--txt2)':''}">${ex.name}</div>
        <div class="sum-ex-log">${setLog||ex.sets+' séries × '+ex.reps}</div>
        ${es.note?`<div class="sum-ex-log" style="color:var(--txt3);margin-top:2px">${es.note}</div>`:''}
      </div>`;
    logList.appendChild(row);
  });
  show('summary');resetTimer();renderWeekGrid();renderWorkoutList();renderHistory();
}

function clearHistory(){
  if(!confirm('Apagar o histórico de treinos?\n\nSeus pesos e anotações serão mantidos.'))return;
  lsSet('hist',[]);renderHistory();showSaved();
}

function goHome(){state.currentWorkout=null;show('home');renderWeekGrid();renderWorkoutList();renderHistory();}

function show(v){
  document.getElementById('home-view').style.display=v==='home'?'block':'none';
  document.getElementById('train-view').style.display=v==='train'?'block':'none';
  document.getElementById('summary-view').style.display=v==='summary'?'block':'none';
  window.scrollTo(0,0);
}

initDate();show('home');renderWeekGrid();renderWorkoutList();renderHistory();
</script>
</body>
</html>
